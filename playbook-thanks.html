<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Your Playbook — Plinthos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0f1a;
      --bg-card: #111827;
      --text-primary: #f0f2f5;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.12);
      --border: rgba(148, 163, 184, 0.12);
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      font-family: var(--sans);
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3.5rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    .check {
      width: 56px; height: 56px;
      background: var(--accent-soft);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .check svg { width: 28px; height: 28px; }
    h1 {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
      margin: 0.4rem;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--accent); color: var(--bg-dark); }
    .btn-secondary {
      background: transparent; color: var(--accent);
      border: 1px solid rgba(96, 165, 250, 0.3);
    }
    .divider {
      width: 60px; height: 1px;
      background: var(--border);
      margin: 1.5rem auto;
    }
    .small { font-size: 0.85rem; color: var(--text-muted); }
    .logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--text-primary);
      text-decoration: none;
      position: absolute;
      top: 1.5rem;
      left: 2rem;
    }
  </style>
</head>
<body>

  <a href="https://plinthos.io/" class="logo">Plinthos.</a>

  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Thank you!</h1>
    <p>Your download should start automatically. If it doesn't, click the button below.</p>
    <a href="/The_Sustainability_Intelligence_Playbook.pdf" download class="btn btn-primary">Download PDF →</a>
    <div class="divider"></div>
    <p>Get weekly insights on AI and sustainability in real estate:</p>
    <a href="https://substack.com/@sherryxucom" target="_blank" rel="noopener" class="btn btn-secondary">Subscribe on Substack →</a>
    <div class="divider"></div>
    <p class="small"><a href="https://plinthos.io/" style="color: var(--accent); text-decoration: none;">← Back to plinthos.io</a></p>
  </div>

  <!-- Auto-download PDF on page load -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var link = document.createElement('a');
        link.href = '/The_Sustainability_Intelligence_Playbook.pdf';
        link.download = 'The_Sustainability_Intelligence_Playbook.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }, 1000);
    });
  </script>

</body>
</html>
